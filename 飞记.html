<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>飞记・机场互飞登记</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: #eef2f7;
            margin: 0;
            padding: 24px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #0b2b3b, #1c5a6a);
            padding: 24px 28px;
            color: white;
        }

        .header h1 {
            margin: 0 0 6px 0;
            font-weight: 600;
            font-size: 1.9rem;
        }

        .header p {
            margin: 0;
            opacity: 0.85;
            font-size: 0.95rem;
        }

        .form-card {
            background: #ffffff;
            margin: 24px 28px 0 28px;
            padding: 20px 24px;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #e9edf2;
        }

        .form-title {
            font-weight: 600;
            font-size: 1.3rem;
            margin: 0 0 6px 0;
            color: #1e3a4a;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .subnote {
            font-size: 0.8rem;
            color: #5a6e7c;
            margin-bottom: 20px;
            border-left: 3px solid #3b9bb7;
            padding-left: 12px;
        }

        .main-info-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 24px;
        }

        .input-field {
            flex: 1 1 240px;
            min-width: 200px;
        }

        .input-field label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #4b6f7e;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .input-field input, .input-field select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 40px;
            border: 1.5px solid #dce3e9;
            background: #fefefe;
            font-size: 0.9rem;
            outline: none;
        }

        .airports-section {
            margin-top: 8px;
            border-radius: 28px;
            background: #fcfdff;
            padding: 12px;
            user-select: none;
        }

        .airport-group-card {
            background: white;
            border-radius: 24px;
            margin-bottom: 12px;
            border: 1px solid #e2edf2;
            transition: all 0.2s;
            cursor: default;
        }
        .airport-group-card.dragging {
            opacity: 0.5;
            transform: scale(0.98);
        }
        .airport-group-card.drag-over {
            border-top: 3px solid #1f6e82;
        }
        .airport-group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            background: #f8fafd;
            border-radius: 24px;
            cursor: pointer;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
        }
        .airport-group-header .airport-title {
            font-weight: 600;
            color: #1f5e72;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .airport-badge {
            background: #e0ecf5;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        .airport-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .collapse-icon {
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .airport-group-body {
            padding: 16px 18px;
            border-top: 1px solid #eef2f8;
        }

        .aircraft-group-card {
            background: #fefefe;
            border-radius: 20px;
            margin-top: 12px;
            border: 1px solid #eaf0f5;
        }

        .aircraft-group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: #ffffff;
            border-radius: 20px;
            cursor: pointer;
        }

        .aircraft-group-body {
            padding: 12px 16px;
            border-top: 1px solid #eef2f8;
        }

        .aircraft-row {
            display: flex;
            gap: 12px;
            padding: 8px 0;
            align-items: center;
            flex-wrap: wrap;
        }

        .model-col {
            flex: 2;
            min-width: 160px;
        }

        .qty-col {
            flex: 1;
            min-width: 90px;
            padding: 10px 12px;
            border-radius: 40px;
            border: 1.5px solid #dce3e9;
            font-size: 0.9rem;
        }

        .remove-row {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #bc5a4c;
            padding: 6px 8px;
            border-radius: 40px;
        }

        .add-aircraft-btn-small {
            margin-top: 8px;
            background: #eef2fa;
            border: 1px dashed #8bb4c2;
            border-radius: 40px;
            padding: 6px 12px;
            font-size: 0.75rem;
            cursor: pointer;
            display: inline-block;
        }

        .add-airport-btn {
            background: #eef2fa;
            border: 1px dashed #2c8faa;
            border-radius: 40px;
            padding: 10px 18px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 12px;
            width: 100%;
            text-align: center;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn {
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            background: #f1f5f9;
            color: #1e4a5f;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #1f6e82;
            color: white;
        }

        .stats-bar {
            margin: 20px 28px 12px 28px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .stats {
            background: #eef2fa;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.85rem;
        }

        .filter-bar {
            margin: 12px 28px 8px 28px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .filter-select {
            border-radius: 60px !important;
            padding: 8px 20px 8px 18px;
            background-color: white;
            border: 1.5px solid #dce3e9;
            font-size: 0.85rem;
            cursor: pointer;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%234b6f7e" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 14px center;
        }

        .filter-input {
            border-radius: 60px !important;
            padding: 8px 18px;
            border: 1.5px solid #dce3e9;
            font-size: 0.85rem;
            width: 220px;
        }

        .reset-filter {
            background: #f1f5f9;
            border-radius: 60px;
            border: none;
            padding: 8px 18px;
            cursor: pointer;
        }

        .table-wrapper {
            margin: 0 20px 28px 20px;
            overflow-x: auto;
            border-radius: 24px;
            border: 1px solid #edf2f7;
        }

        .regist-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 950px;
        }

        .regist-table th {
            background: #f8fafd;
            padding: 14px 12px;
            text-align: left;
            font-weight: 600;
            color: #1f5e72;
        }

        .regist-table td {
            padding: 12px 12px;
            border-bottom: 1px solid #f0f4f9;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .status-active { background: #dff0e6; color: #2e7d64; }
        .status-terminated { background: #ffe0db; color: #bc5a4c; }
        .aircraft-summary {
            background: #f4f9fc;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            font-size: 0.75rem;
        }
        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            margin: 0 4px;
        }
        .contact-badge { display: inline-flex; align-items: center; gap: 6px; background: #eef2fa; padding: 4px 10px; border-radius: 40px; }
        .contact-type-buttons { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .contact-type-btn { background: #f1f5f9; border: 1.5px solid #dce3e9; border-radius: 40px; padding: 6px 18px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
        .contact-type-btn.active { background: #1f6e82; color: white; border-color: #0f5a6b; }
        .searchable-select .select-trigger { border-radius: 40px !important; background: white; }
        .searchable-select .dropdown { border-radius: 24px !important; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .airport-group-body select { border-radius: 40px !important; padding: 8px 20px 8px 18px; }
        .modal-mask {
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .edit-modal {
            background: white; border-radius: 32px; max-width: 900px; width: 90%; max-height: 85vh;
            overflow-y: auto; padding: 20px 24px; box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        .edit-modal h3 { margin-top: 0; color:#1f5e72; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; }
        .template-download {
            margin-left: 12px;
            font-size: 0.75rem;
            background: #eef2fa;
            border-radius: 30px;
            padding: 2px 12px;
            cursor: pointer;
        }
        .import-hint {
            font-size: 0.7rem;
            color: #5a6e7c;
            margin-top: 4px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>飞记・机场互飞登记</h1>
        <p>欢迎来到「飞记」，你的机场互飞登记</p>
    </div>

    <div class="form-card">
        <div class="form-title">
            <span class="form-title-left">📝 新登记 / 发送记录</span>
            <button class="btn" id="cancelEditBtn" style="display:none;">取消编辑</button>
        </div>
        <div class="subnote">如果有遇到问题可以加QQ群：198223617</div>
        <input type="hidden" id="editId" value="">

        <div class="main-info-row">
            <div class="input-field">
                <label>玩家ID *</label>
                <input type="text" id="playerId" placeholder="游戏ID / 昵称">
            </div>
            <div class="input-field">
                <label>联系方式 *</label>
                <div class="contact-condition">
                    <div class="contact-type-buttons" id="contactTypeButtons">
                        <div class="contact-type-btn" data-type="微信">💬 微信</div>
                        <div class="contact-type-btn" data-type="QQ">🐧 QQ</div>
                        <div class="contact-type-btn" data-type="名称">🏷️ 名称/其他</div>
                    </div>
                    <input type="text" id="contactAccount" placeholder="微信号 / QQ号">
                </div>
            </div>
        </div>

        <div id="multiAirportsContainer" class="airports-section"></div>
        <button type="button" id="addAirportGroupBtn" class="add-airport-btn">+ 添加新机场</button>

        <div class="button-group">
            <button class="btn btn-primary" id="addRecordBtn">✈️ 保存记录</button>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stats" id="statsDisplay">📋 总计: 0 条 | 合作中: 0 条 | 已终止: 0 条</div>
        <div class="action-buttons">
            <button class="btn" id="importTxtBtn">📂 导入JSON</button>
            <button class="btn" id="exportTxtBtn">📎 导出JSON</button>
            <button class="btn" id="downloadTemplateBtn">📄 下载导入模板</button>
            <button class="btn" id="clearAllBtn">🗑️ 清空全部</button>
        </div>
    </div>
    <div class="filter-bar" style="margin-top:0; justify-content:flex-start;">
        <div class="import-hint">📌本网页为本地存储，更换设备前请先导出数据，再在新设备中导入，才能继续使用你的记录。 </div>
    </div>

    <div class="filter-bar">
        <div class="filter-group">
            <select id="filterContactType" class="filter-select"><option value="all">全部联系方式</option><option value="微信">微信</option><option value="QQ">QQ</option><option value="名称">名称</option></select>
            <select id="filterStatus" class="filter-select"><option value="all">全部状态</option><option value="active">合作中</option><option value="terminated">已终止</option></select>
            <input type="text" id="filterKeyword" class="filter-input" placeholder="ID/账号/机场/机型">
            <button id="resetFilterBtn" class="reset-filter">重置</button>
        </div>
        <div class="stats" id="filterStats">显示全部</div>
    </div>

    <div class="table-wrapper">
        <table class="regist-table"><thead><tr><th>玩家ID</th><th>联系方式</th><th>目标机场</th><th>机型清单</th><th>状态</th><th>登记时间</th><th>操作</th></tr></thead>
        <tbody id="tableBody"><tr class="empty-row"><td colspan="7">暂无数据</td></tr></tbody>
        </table>
    </div>
</div>

<script>
    const airportList = [
        { code: "HKG", name: "香港国际机场" },{ code: "INN", name: "因斯布鲁克机场" },{ code: "BRI", name: "巴里机场" },
        { code: "PRG", name: "布拉格机场" },{ code: "IAD", name: "华盛顿杜勒斯" },{ code: "NGO", name: "名古屋中部国际" },
        { code: "SAN", name: "圣地亚哥机场" },{ code: "MCT", name: "马斯喀特机场" },{ code: "LEJ", name: "莱比锡机场" },
        { code: "SXM", name: "朱丽安娜公主机场" },{ code: "LHR", name: "伦敦希思罗" },{ code: "SYD", name: "悉尼机场" },
        { code: "BKK", name: "素万那普机场" },{ code: "MSY", name: "新奥尔良机场" },{ code: "GRU", name: "圣保罗机场" },
        { code: "SCL", name: "圣地亚哥智利机场" },{ code: "CNN", name: "坎努尔机场" }
    ];
    const aircraftDatabase = { "空客": ["A19N","A20N","A21N","A21NX","A21NY","A318","A319","A320","A321","BCS1","BCS3","A321F","A306","A306F","A30BF","A3ST","A332","A333","A343","A346","A359","A35K","A332F","A388","A339"],"波音": ["B38M","B734","B738","B734F","B738F","B752","B753","B762","B763","B764","B752CF","B752F","B762F","B763F","C17","B744","B772","B773","B77L","B77W","B789","B78X","B744BCF","B744F","B77LF","B77WF","B748","B748F"],"庞巴迪": ["CRJ2","CRJ7","CRJ9","CRJX","CRJ2F"],"DeHavilland": ["DHC6","DH8A","DH8B","DH8C","DH8D","DH64"],"ATR": ["AT43","AT45","AT46","AT75","ATR76","AT43F","AT75F"],"Embraer": ["E135","E140","E145","E170","E175","E190","E195","E290","E295","E190F"],"COMAC": ["C909","C909F","C919"],"BAESystems": ["B463","B463F"],"Fokker": ["F70","F100"],"Saab": ["SF34","SF34F"],"Lockheed": ["C30J","C17"],"麦道": ["MD11","MD11F"],"Antonov": ["AN12","AN22","A124","A225"],"协和": ["CONC"] };
    const allModels = Object.values(aircraftDatabase).flat();
    const uniqueModels = [...new Set(allModels)].sort();

    let records = [];
    let selectedContactType = "微信";
    let editingRecordId = null;
    let airportGroups = [{ airportCode: "", aircraftItems: [{ model: "", qty: 1 }] }];
    let dragSrcIndex = null;
    let pressTimer = null;
    let dragStarted = false;

    // DOM elements
    const playerIdInput = document.getElementById('playerId');
    const contactAccountInput = document.getElementById('contactAccount');
    const addRecordBtn = document.getElementById('addRecordBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const multiAirportsContainer = document.getElementById('multiAirportsContainer');
    const addAirportGroupBtn = document.getElementById('addAirportGroupBtn');
    const exportTxtBtn = document.getElementById('exportTxtBtn');
    const importTxtBtn = document.getElementById('importTxtBtn');
    const downloadTemplateBtn = document.getElementById('downloadTemplateBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const tableBody = document.getElementById('tableBody');
    const statsDisplaySpan = document.getElementById('statsDisplay');
    const filterContactSelect = document.getElementById('filterContactType');
    const filterStatusSelect = document.getElementById('filterStatus');
    const filterKeywordInput = document.getElementById('filterKeyword');
    const resetFilterBtn = document.getElementById('resetFilterBtn');
    const filterStatsSpan = document.getElementById('filterStats');
    const contactTypeBtns = document.querySelectorAll('#contactTypeButtons .contact-type-btn');

    function formatDate(dateObj) { const y=dateObj.getFullYear(), m=String(dateObj.getMonth()+1).padStart(2,'0'), d=String(dateObj.getDate()).padStart(2,'0'), h=String(dateObj.getHours()).padStart(2,'0'), min=String(dateObj.getMinutes()).padStart(2,'0'); return `${y}-${m}-${d} ${h}:${min}`; }
    function saveToLocal() { localStorage.setItem("airport_multi_final", JSON.stringify(records)); }
    function loadFromLocal() { 
        const stored = localStorage.getItem("airport_multi_final"); 
        if(stored) { try{ records = JSON.parse(stored); if(!Array.isArray(records)) records=[]; } catch(e){ records=[]; } } else records=[]; 
        records = records.map(r => ({ ...r, status: r.status || 'active', formattedTime: r.formattedTime || formatDate(new Date(r.timestamp||Date.now())), aircraftItems: r.aircraftItems || [], contactType: r.contactType || '微信', contactAccount: r.contactAccount || '' })); 
        updateStats(); applyFilterAndRender(); 
    }
    function updateStats() { const total=records.length, active=records.filter(r=>r.status==='active').length; statsDisplaySpan.innerHTML=`📋 总计: ${total} 条 | 合作中: ${active} 条 | 已终止: ${total-active} 条`; }
    
    let filterContact = "all", filterStatus = "all", filterKeyword = "";
    function getFilteredRecords() { 
        let filtered = [...records]; 
        if(filterContact !== 'all') filtered = filtered.filter(r => r.contactType === filterContact); 
        if(filterStatus !== 'all') filtered = filtered.filter(r => r.status === filterStatus); 
        if(filterKeyword.trim()) { const kw=filterKeyword.trim().toLowerCase(); filtered = filtered.filter(r => r.playerId.toLowerCase().includes(kw) || r.contactAccount.toLowerCase().includes(kw) || r.airport.toLowerCase().includes(kw) || (r.aircraftItems||[]).some(item=>item.model.toLowerCase().includes(kw))); } 
        return filtered; 
    }
    
    function renderTable() {
        const filtered = getFilteredRecords();
        if(filtered.length===0) { tableBody.innerHTML = `<tr class="empty-row"><td colspan="7">暂无匹配记录</td></tr>`; filterStatsSpan.innerText = `筛选: 0 / ${records.length}`; return; }
        let html = '';
        filtered.forEach(rec => {
            const summary = (rec.aircraftItems||[]).map(item=>`${item.model} ${item.qty}架`).join("、");
            html += `<tr><td><strong>${escapeHtml(rec.playerId)}</strong></td><td><div class="contact-badge">${rec.contactType==='微信'?'💬':(rec.contactType==='QQ'?'🐧':'🏷️')} ${rec.contactType} · ${escapeHtml(rec.contactAccount)}</div></td><td><span style="background:#e2f0f0;padding:4px 10px;border-radius:20px;">${escapeHtml(rec.airport)}</span></td><td><div class="aircraft-summary">${escapeHtml(summary) || "无"}</div></td><td><span class="status-badge ${rec.status==='active'?'status-active':'status-terminated'}">${rec.status==='active'?'合作中':'已终止'}</span></td><td style="font-size:0.7rem;">${rec.formattedTime}</td><td><button class="icon-btn edit-btn" data-id="${rec.id}">✏️</button> <button class="icon-btn toggle-btn" data-id="${rec.id}">🔄</button> <button class="icon-btn delete-btn" data-id="${rec.id}">🗑️</button></td></tr>`;
        });
        tableBody.innerHTML = html;
        filterStatsSpan.innerText = `筛选: ${filtered.length} / ${records.length}`;
        document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', (e) => { openEditDialog(btn.getAttribute('data-id')); }));
        document.querySelectorAll('.toggle-btn').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); toggleStatus(id); }));
        document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); deleteRecordById(id); }));
    }
    function escapeHtml(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
    function deleteRecordById(id) { if(confirm('删除此条记录？')) { records = records.filter(r => String(r.id)!==String(id)); saveToLocal(); updateStats(); applyFilterAndRender(); if(editingRecordId===id) cancelEdit(); } }
    function toggleStatus(id) { const rec = records.find(r => String(r.id)===String(id)); if(rec) { rec.status = rec.status==='active'?'terminated':'active'; saveToLocal(); updateStats(); applyFilterAndRender(); } }
    function applyFilterAndRender() { renderTable(); }

    // 机型选择组件
    function createSearchableModelSelect(selectedModel, onchangeCallback, existingModels) {
        const wrapper = document.createElement('div'); wrapper.className = 'searchable-select'; wrapper.style.position='relative'; wrapper.style.width='100%';
        const trigger = document.createElement('div'); trigger.className = 'select-trigger'; trigger.style.cssText='display:flex;justify-content:space-between;padding:10px 12px;border:1.5px solid #dce3e9;border-radius:40px;background:white;cursor:pointer';
        const labelSpan = document.createElement('span'); labelSpan.textContent = selectedModel || "-- 选择机型 --";
        trigger.appendChild(labelSpan); trigger.appendChild(document.createTextNode("▼"));
        const dropdown = document.createElement('div'); dropdown.className='dropdown'; dropdown.style.position='absolute'; dropdown.style.top='100%'; dropdown.style.left=0; dropdown.style.right=0; dropdown.style.background='white'; dropdown.style.border='1px solid #cad2da'; dropdown.style.borderRadius='24px'; dropdown.style.zIndex=200; dropdown.style.display='none'; dropdown.style.maxHeight='250px'; dropdown.style.overflow='auto';
        const searchDiv = document.createElement('div'); searchDiv.style.padding='8px'; const searchInput = document.createElement('input'); searchInput.type='text'; searchInput.placeholder='🔍 搜索机型'; searchInput.style.width='100%'; searchInput.style.borderRadius='40px'; searchInput.style.padding='8px 12px'; searchInput.style.border='1px solid #ddd'; searchDiv.appendChild(searchInput);
        const optionsList = document.createElement('div'); optionsList.className='option-list';
        dropdown.appendChild(searchDiv); dropdown.appendChild(optionsList); wrapper.appendChild(trigger); wrapper.appendChild(dropdown);
        let currentVal = selectedModel;
        function render(filter=''){ 
            optionsList.innerHTML=''; 
            let filtered = uniqueModels.filter(m=>m.toLowerCase().includes(filter.toLowerCase()));
            filtered = filtered.filter(m => m === currentVal || !existingModels.includes(m));
            if(filtered.length===0){ const d=document.createElement('div'); d.textContent='无匹配或机型已存在'; d.style.padding='10px'; d.style.color='#bc5a4c'; optionsList.appendChild(d); return; } 
            filtered.forEach(m=>{ const opt=document.createElement('div'); opt.textContent=m; opt.style.padding='10px 14px'; opt.style.cursor='pointer'; if(currentVal===m) opt.style.background='#e0ecf5'; opt.onclick=()=>{ 
                if(existingModels.includes(m) && m !== currentVal) { alert('该机型已添加，不可重复选择'); return; }
                currentVal=m; labelSpan.textContent=m; dropdown.style.display='none'; if(onchangeCallback) onchangeCallback(m); 
            }; optionsList.appendChild(opt); }); 
        }
        searchInput.addEventListener('input',()=>render(searchInput.value));
        trigger.onclick=(e)=>{ e.stopPropagation(); dropdown.style.display= dropdown.style.display==='none'?'block':'none'; if(dropdown.style.display==='block') render(searchInput.value); };
        document.addEventListener('click',(e)=>{ if(!wrapper.contains(e.target)) dropdown.style.display='none'; });
        render('');
        wrapper.setValue = (val) => { currentVal = val; labelSpan.textContent = val||"-- 选择机型 --"; };
        return wrapper;
    }

    // 渲染带长按拖拽的机场列表
    function renderAirportGroups(container, groups, onUpdate, expandedIdx = 0, isEditMode = false) {
        container.innerHTML = '';
        groups.forEach((group, idx) => {
            const isExpanded = (idx === expandedIdx);
            const card = document.createElement('div'); card.className = 'airport-group-card'; card.setAttribute('data-index', idx);
            const header = document.createElement('div'); header.className = 'airport-group-header';
            const apInfo = group.airportCode ? (airportList.find(a=>a.code===group.airportCode) || {code:group.airportCode, name:group.airportCode}) : {code:"", name:"未选择"};
            header.innerHTML = `<div class="header-left"><div class="airport-title"><span class="airport-badge">✈️ 目标机场</span> <strong>${apInfo.code ? `${apInfo.code} ${apInfo.name}` : "请选择机场"}</strong></div></div><div class="airport-actions"><button class="remove-row" style="background:none;border:none;cursor:pointer;">🗑️ 删除机场</button><span class="collapse-icon">${isExpanded ? '▼' : '▶'}</span></div>`;
            const body = document.createElement('div'); body.className = 'airport-group-body'; body.style.display = isExpanded ? 'block' : 'none';
            const selectDiv = document.createElement('div'); selectDiv.style.marginBottom='16px';
            const selectLabel = document.createElement('label'); selectLabel.textContent='选择机场: '; selectLabel.style.fontSize='0.8rem';
            const airportSelect = document.createElement('select'); airportSelect.style.borderRadius='40px'; airportSelect.style.padding='8px 16px';
            const defaultOption = document.createElement('option'); defaultOption.value=''; defaultOption.textContent='-- 选择机场 --'; defaultOption.disabled = true; defaultOption.selected = (group.airportCode === '');
            airportSelect.appendChild(defaultOption);
            airportList.forEach(ap => { const opt = document.createElement('option'); opt.value=ap.code; opt.textContent=`${ap.code} ${ap.name}`; if(ap.code===group.airportCode) opt.selected=true; airportSelect.appendChild(opt); });
            selectDiv.appendChild(selectLabel); selectDiv.appendChild(airportSelect);
            body.appendChild(selectDiv);
            const aircraftArea = document.createElement('div');
            let aircraftExpanded = isExpanded;
            const refreshAircraft = () => {
                aircraftArea.innerHTML = '';
                const aCard = document.createElement('div'); aCard.className = 'aircraft-group-card';
                const aHeader = document.createElement('div'); aHeader.className = 'aircraft-group-header'; 
                aHeader.innerHTML = `<span>✈️ 机型与架数 (${group.aircraftItems.length}项)</span><span class="collapse-icon">${aircraftExpanded ? '▼' : '▶'}</span>`;
                const aBody = document.createElement('div'); aBody.className = 'aircraft-group-body'; aBody.style.display = aircraftExpanded ? 'block' : 'none';
                const build = () => {
                    aBody.innerHTML = '';
                    const existingModelsSet = group.aircraftItems.map(item => item.model).filter(m => m && m.trim() !== '');
                    group.aircraftItems.forEach((item, aidx) => {
                        const row = document.createElement('div'); row.className = 'aircraft-row';
                        const modelCol = document.createElement('div'); modelCol.className = 'model-col';
                        const ms = createSearchableModelSelect(item.model, (newVal) => { group.aircraftItems[aidx].model = newVal; if(onUpdate) onUpdate(); }, existingModelsSet);
                        if(item.model) ms.setValue(item.model);
                        modelCol.appendChild(ms);
                        const qtyInput = document.createElement('input'); qtyInput.type='number'; qtyInput.className='qty-col'; qtyInput.value=item.qty; qtyInput.min=1;
                        qtyInput.addEventListener('change',()=>{ group.aircraftItems[aidx].qty = parseInt(qtyInput.value)||1; if(onUpdate) onUpdate(); });
                        const delBtn = document.createElement('button'); delBtn.textContent='🗑️'; delBtn.className='remove-row';
                        delBtn.onclick = () => { if(group.aircraftItems.length>1){ group.aircraftItems.splice(aidx,1); build(); if(onUpdate) onUpdate(); } else alert('至少保留一行机型'); };
                        row.appendChild(modelCol); row.appendChild(qtyInput); row.appendChild(delBtn);
                        aBody.appendChild(row);
                    });
                    const addBtn = document.createElement('button'); addBtn.textContent='+ 添加机型'; addBtn.className='add-aircraft-btn-small';
                    addBtn.onclick = () => { group.aircraftItems.push({ model: "", qty: 1 }); build(); if(onUpdate) onUpdate(); };
                    aBody.appendChild(addBtn);
                };
                build();
                aHeader.onclick = () => { aircraftExpanded = !aircraftExpanded; aBody.style.display = aircraftExpanded ? 'block' : 'none'; aHeader.querySelector('.collapse-icon').textContent = aircraftExpanded ? '▼' : '▶'; };
                aCard.appendChild(aHeader); aCard.appendChild(aBody);
                aircraftArea.appendChild(aCard);
            };
            refreshAircraft();
            body.appendChild(aircraftArea);
            card.appendChild(header); card.appendChild(body);
            container.appendChild(card);
            
            airportSelect.onchange = () => { const newCode = airportSelect.value; if(!newCode) return; if(!isEditMode && groups.some((g,i)=>i!==idx && g.airportCode===newCode)) { alert('该机场已被添加'); airportSelect.value = group.airportCode || ''; return; } group.airportCode = newCode; renderAirportGroups(container, groups, onUpdate, expandedIdx, isEditMode); if(onUpdate) onUpdate(); };
            const delBtn = header.querySelector('.remove-row'); delBtn.onclick = (e) => { e.stopPropagation(); if(groups.length > 1){ groups.splice(idx,1); let newExpand = Math.min(expandedIdx, groups.length-1); if(newExpand<0) newExpand=0; renderAirportGroups(container, groups, onUpdate, newExpand, isEditMode); if(onUpdate) onUpdate(); } else alert('至少保留一个机场'); };
            const collapseIcon = header.querySelector('.collapse-icon'); collapseIcon.onclick = (e) => { e.stopPropagation(); if(body.style.display === 'none') renderAirportGroups(container, groups, onUpdate, idx, isEditMode); else renderAirportGroups(container, groups, onUpdate, -1, isEditMode); };
            // 长按拖拽
            let longPress = null;
            card.addEventListener('mousedown', (e) => { if(e.target.closest('.remove-row') || e.target.closest('.collapse-icon') || e.target.closest('select')) return; longPress = setTimeout(() => { dragSrcIndex = idx; card.classList.add('dragging'); dragStarted = true; }, 300); });
            card.addEventListener('mouseup', () => { if(longPress) clearTimeout(longPress); if(dragStarted) { card.classList.remove('dragging'); dragStarted = false; dragSrcIndex = null; } });
            card.addEventListener('mouseleave', () => { if(longPress) clearTimeout(longPress); if(dragStarted) { card.classList.remove('dragging'); dragStarted = false; dragSrcIndex = null; } });
            card.addEventListener('dragover', (e) => { e.preventDefault(); if(dragSrcIndex !== null && dragSrcIndex !== idx) { const moved = groups.splice(dragSrcIndex,1)[0]; groups.splice(idx,0,moved); let newExpand = (idx === dragSrcIndex) ? expandedIdx : (expandedIdx === dragSrcIndex ? idx : (expandedIdx > dragSrcIndex && expandedIdx <= idx ? expandedIdx-1 : (expandedIdx < dragSrcIndex && expandedIdx >= idx ? expandedIdx+1 : expandedIdx))); if(newExpand<0) newExpand=0; renderAirportGroups(container, groups, onUpdate, newExpand, isEditMode); if(onUpdate) onUpdate(); dragSrcIndex = idx; } });
            card.addEventListener('dragstart', (e) => e.preventDefault());
        });
    }

    function renderMainAirportGroups(expandIdx = 0, isEditMode = false) { renderAirportGroups(multiAirportsContainer, airportGroups, () => {}, expandIdx, isEditMode); }
    function addAirportGroup() { if(editingRecordId) { alert('编辑模式下不能新增机场'); return; } airportGroups.push({ airportCode: "", aircraftItems: [{ model: "", qty: 1 }] }); renderMainAirportGroups(airportGroups.length - 1, false); }
    
    async function saveBatch() {
        if(editingRecordId) { alert('请先取消编辑'); return; }
        const playerId = playerIdInput.value.trim();
        const contactAccount = contactAccountInput.value.trim();
        if(!playerId || !contactAccount) { alert('玩家ID和联系方式不能为空'); return; }
        for(let i=0;i<airportGroups.length;i++) {
            if(!airportGroups[i].airportCode) { alert(`第${i+1}个目标机场未选择`); return; }
            const validItems = airportGroups[i].aircraftItems.filter(item => item.model && item.model.trim() !== '' && item.qty>0);
            if(validItems.length===0) { alert(`机场 ${airportGroups[i].airportCode} 至少需要一个有效机型`); return; }
            const models = validItems.map(i=>i.model);
            if(new Set(models).size !== models.length) { alert(`机场 ${airportGroups[i].airportCode} 内存在重复机型`); return; }
        }
        const airportCodes = airportGroups.map(g=>g.airportCode);
        if(new Set(airportCodes).size !== airportCodes.length) { alert('存在重复的目标机场'); return; }
        const newRecords = airportGroups.map(grp => ({ id: Date.now() + Math.random() + Math.floor(Math.random()*10000), playerId, contactType: selectedContactType, contactAccount, airport: grp.airportCode, aircraftItems: grp.aircraftItems.filter(i=>i.model && i.model.trim() !== ''), status: 'active', timestamp: Date.now(), formattedTime: formatDate(new Date()) }));
        records.unshift(...newRecords);
        saveToLocal(); updateStats(); applyFilterAndRender();
        playerIdInput.value = ''; contactAccountInput.value = '';
        airportGroups = [{ airportCode: "", aircraftItems: [{ model: "", qty: 1 }] }];
        renderMainAirportGroups(0, false);
        alert(`成功登记 ${newRecords.length} 条记录`);
    }

    function openEditDialog(recordId) {
        const record = records.find(r => String(r.id) === String(recordId));
        if(!record) return;
        editingRecordId = recordId;
        const editGroup = { airportCode: record.airport, aircraftItems: JSON.parse(JSON.stringify(record.aircraftItems || [])) };
        const modalDiv = document.createElement('div'); modalDiv.className = 'modal-mask';
        modalDiv.innerHTML = `<div class="edit-modal"><h3>✏️ 编辑记录</h3><div class="main-info-row"><div class="input-field"><label>玩家ID</label><input id="editPlayerId" value="${escapeHtml(record.playerId)}"></div><div class="input-field"><label>联系方式类型</label><div id="editContactTypeBtns" class="contact-type-buttons"><div class="contact-type-btn" data-type="微信">💬 微信</div><div class="contact-type-btn" data-type="QQ">🐧 QQ</div><div class="contact-type-btn" data-type="名称">🏷️ 名称</div></div><input id="editContactAccount" value="${escapeHtml(record.contactAccount)}"></div></div><div id="editAirportsArea" class="airports-section" style="max-height:50vh; overflow-y:auto"></div><div class="modal-buttons"><button id="saveEditBtn" class="btn btn-primary">保存修改</button><button id="closeEditBtn" class="btn">取消</button></div></div>`;
        document.body.appendChild(modalDiv);
        const editAirportsDiv = document.getElementById('editAirportsArea');
        let editGroups = [editGroup];
        let editContactType = record.contactType;
        const renderEdit = () => renderAirportGroups(editAirportsDiv, editGroups, () => {}, 0, true);
        renderEdit();
        const editPlayer = document.getElementById('editPlayerId');
        const editAccount = document.getElementById('editContactAccount');
        const editBtns = modalDiv.querySelectorAll('#editContactTypeBtns .contact-type-btn');
        editBtns.forEach(btn => { if(btn.getAttribute('data-type')===editContactType) btn.classList.add('active'); btn.onclick = () => { editContactType = btn.getAttribute('data-type'); editBtns.forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }; });
        document.getElementById('saveEditBtn').onclick = () => {
            const newPlayer = editPlayer.value.trim(), newAcc = editAccount.value.trim();
            if(!newPlayer || !newAcc) { alert('请填写完整'); return; }
            if(!editGroups[0].airportCode) { alert('请选择机场'); return; }
            const valid = editGroups[0].aircraftItems.filter(i=>i.model && i.model.trim() !== '' && i.qty>0);
            if(valid.length===0) { alert('至少一个机型'); return; }
            if(new Set(valid.map(i=>i.model)).size !== valid.length) { alert('机型重复'); return; }
            const idx = records.findIndex(r => String(r.id) === String(recordId));
            if(idx !== -1) records[idx] = { ...records[idx], playerId: newPlayer, contactType: editContactType, contactAccount: newAcc, airport: editGroups[0].airportCode, aircraftItems: valid, timestamp: Date.now(), formattedTime: formatDate(new Date()) };
            saveToLocal(); updateStats(); applyFilterAndRender();
            document.body.removeChild(modalDiv);
            editingRecordId = null;
        };
        document.getElementById('closeEditBtn').onclick = () => document.body.removeChild(modalDiv);
    }

    // 导出 - 标准格式（带 exportDate 包裹）
    function exportAsTxt() {
        const exportRecords = records.map(r => ({ "玩家ID": r.playerId, "联系方式": `${r.contactType}:${r.contactAccount}`, "机场": r.airport, "机型明细": r.aircraftItems, "状态": r.status === 'active' ? 'active' : 'terminated', "登记时间": r.formattedTime }));
        const dataStr = JSON.stringify({ exportDate: new Date().toISOString(), records: exportRecords }, null, 2);
        const blob = new Blob([dataStr], {type: 'text/plain'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `airport_records_${Date.now()}.json`; a.click(); URL.revokeObjectURL(a.href);
    }
    
    // 导入 - 支持纯数组格式和对象格式
    function importFromTxt() {
        const input = document.createElement('input'); input.type = 'file'; input.accept = '.txt,.json';
        input.onchange = e => { 
            const file = e.target.files[0]; 
            if(!file) return; 
            const reader = new FileReader(); 
            reader.onload = ev => { 
                try { 
                    const content = ev.target.result;
                    const json = JSON.parse(content);
                    
                    let importedRecords = [];
                    
                    // 情况1: 纯数组格式 [ {...}, {...} ]
                    if (Array.isArray(json)) {
                        importedRecords = json;
                    }
                    // 情况2: 对象格式 { records: [...] }
                    else if (json.records && Array.isArray(json.records)) {
                        importedRecords = json.records;
                    }
                    // 情况3: 单个对象
                    else if (typeof json === 'object' && json !== null && json.玩家ID) {
                        importedRecords = [json];
                    }
                    else {
                        throw new Error('无法识别的JSON格式');
                    }
                    
                    if (importedRecords.length === 0) {
                        throw new Error('没有找到有效的记录数据');
                    }
                    
                    // 转换每条记录
                    const newRecords = [];
                    for (let r of importedRecords) {
                        // 解析联系方式 (格式: "类型:账号")
                        let parts = (r.联系方式 || "").split(':');
                        let cType = parts[0] || '微信';
                        let cAccount = parts.slice(1).join(':') || ''; // 处理账号中可能包含冒号的情况
                        
                        // 确保机型明细是数组
                        let aircraftItems = r.机型明细 || [];
                        if (!Array.isArray(aircraftItems)) {
                            aircraftItems = [];
                        }
                        
                        // 过滤掉无效的机型（model为空）
                        aircraftItems = aircraftItems.filter(item => item.model && item.model.trim() !== '');
                        
                        newRecords.push({ 
                            id: Date.now() + Math.random() + Math.floor(Math.random()*10000), 
                            playerId: r.玩家ID || '', 
                            contactType: cType, 
                            contactAccount: cAccount, 
                            airport: r.机场 || '', 
                            aircraftItems: aircraftItems, 
                            status: (r.状态 === 'terminated' ? 'terminated' : 'active'), 
                            timestamp: Date.now(), 
                            formattedTime: r.登记时间 || formatDate(new Date()) 
                        });
                    }
                    
                    // 合并到现有记录（新导入的放在前面）
                    records = [...newRecords, ...records];
                    saveToLocal(); 
                    updateStats(); 
                    applyFilterAndRender(); 
                    alert(`导入成功！共导入 ${newRecords.length} 条记录，总记录数 ${records.length} 条`);
                    
                } catch(err) { 
                    console.error(err);
                    alert('文件格式错误，请使用下载的模板格式（纯数组格式）\n示例: [{"玩家ID":"xxx","联系方式":"微信:xxx","机场":"HKG","机型明细":[{"model":"B748","qty":2}],"状态":"active","登记时间":"2026-01-15 18:30"}]'); 
                } 
            }; 
            reader.readAsText(file); 
        }; 
        input.click();
    }
    
    // 下载模板 - 纯数组格式（无外层包裹）
    function downloadTemplate() {
        const currentTime = formatDate(new Date());
        const template = [
            {
                "玩家ID": "示例玩家",
                "联系方式": "微信:123456789",
                "机场": "HKG",
                "机型明细": [
                    {"model": "B748", "qty": 2},
                    {"model": "A35K", "qty": 1},
                    {"model": "B789", "qty": 3}
                ],
                "状态": "active",
                "登记时间": currentTime
            }
        ];
        const blob = new Blob([JSON.stringify(template, null, 2)], {type: 'application/json'});
        const a = document.createElement('a'); 
        a.href = URL.createObjectURL(blob); 
        a.download = 'airport_import_template.json'; 
        a.click(); 
        URL.revokeObjectURL(a.href);
    }
    
    function setContactType(type) { selectedContactType=type; contactTypeBtns.forEach(btn=>{ if(btn.getAttribute('data-type')===type) btn.classList.add('active'); else btn.classList.remove('active'); }); const placeholders = { '微信':'微信号', 'QQ':'QQ号', '名称':'名称/其他' }; contactAccountInput.placeholder = placeholders[type]; }
    function cancelEdit() { editingRecordId = null; playerIdInput.value = ''; contactAccountInput.value = ''; airportGroups = [{ airportCode: "", aircraftItems: [{ model: "", qty: 1 }] }]; renderMainAirportGroups(0, false); cancelEditBtn.style.display = 'none'; }
    
    contactTypeBtns.forEach(btn=>btn.addEventListener('click',()=>setContactType(btn.getAttribute('data-type'))));
    setContactType('微信');
    addRecordBtn.addEventListener('click', saveBatch);
    addAirportGroupBtn.addEventListener('click', addAirportGroup);
    exportTxtBtn.addEventListener('click', exportAsTxt);
    importTxtBtn.addEventListener('click', importFromTxt);
    downloadTemplateBtn.addEventListener('click', downloadTemplate);
    clearAllBtn.addEventListener('click', () => { if(confirm('清空全部记录? 此操作不可恢复！')){ records=[]; saveToLocal(); updateStats(); applyFilterAndRender(); } });
    filterContactSelect.addEventListener('change',()=>{ filterContact=filterContactSelect.value; applyFilterAndRender(); });
    filterStatusSelect.addEventListener('change',()=>{ filterStatus=filterStatusSelect.value; applyFilterAndRender(); });
    filterKeywordInput.addEventListener('input',()=>{ filterKeyword=filterKeywordInput.value; applyFilterAndRender(); });
    resetFilterBtn.addEventListener('click',()=>{ filterContact='all'; filterStatus='all'; filterKeyword=''; filterContactSelect.value='all'; filterStatusSelect.value='all'; filterKeywordInput.value=''; applyFilterAndRender(); });
    cancelEditBtn.addEventListener('click', cancelEdit);
    
    renderMainAirportGroups(0, false);
    loadFromLocal();
</script>
